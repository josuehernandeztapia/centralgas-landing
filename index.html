<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Gas</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --azul:  #0D2B4E;
    --cyan:  #00AEEF;
    --verde: #00C48C;
    --gris:  #8A9AB0;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background: var(--azul);
    font-family: 'DM Sans', sans-serif;
    color: white;
  }

  body::before {
    content:'';
    position:fixed; inset:0; z-index:1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none; opacity:.4;
  }

  body::after {
    content:'';
    position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(0,174,239,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,174,239,.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events:none;
  }

  .glow {
    position:fixed; border-radius:50%;
    pointer-events:none; z-index:0; filter: blur(120px);
  }
  .glow-1 {
    width:600px; height:600px;
    background: rgba(0,174,239,.07);
    top:-100px; left:-100px;
    animation: drift1 18s ease-in-out infinite alternate;
  }
  .glow-2 {
    width:400px; height:400px;
    background: rgba(0,196,140,.05);
    bottom:-80px; right:-60px;
    animation: drift2 14s ease-in-out infinite alternate;
  }
  @keyframes drift1 { 0%{transform:translate(0,0)} 100%{transform:translate(60px,40px)} }
  @keyframes drift2 { 0%{transform:translate(0,0)} 100%{transform:translate(-40px,-30px)} }

  .stage {
    position:fixed; inset:0; z-index:2;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:0; margin-top:-50px;
  }

  /* ── LOGO ── */
  .logo-wrap {
    display:flex; align-items:center; gap:24px;
    opacity:0; transform:translateY(20px);
    animation: fadeUp .8s cubic-bezier(.16,1,.3,1) .2s forwards;
  }

  .wm-main {
    font-family:'Rajdhani',sans-serif; font-weight:700;
    font-size:clamp(48px,7vw,96px);
    letter-spacing:4px; text-transform:uppercase;
    line-height:1; color:white;
  }
  .wm-sub {
    font-family:'Rajdhani',sans-serif; font-weight:300;
    font-size:clamp(14px,2vw,26px);
    letter-spacing:10px; text-transform:uppercase;
    color:rgba(255,255,255,.35); margin-top:5px;
  }

  .divider {
    width:1px; height:clamp(55px,8vw,100px);
    background:rgba(255,255,255,.15); margin:0 4px;
  }

  /* ── PILARES ── */
  .pilares {
    display:flex; align-items:stretch; gap:0;
    margin-top:clamp(44px,6vh,72px);
    opacity:0; transform:translateY(16px);
    animation: fadeUp .8s cubic-bezier(.16,1,.3,1) .55s forwards;
    border: 1px solid rgba(255,255,255,.07);
    border-radius:12px; overflow:hidden;
  }

  .pilar {
    display:flex; flex-direction:column;
    align-items:center; gap:7px;
    padding:clamp(20px,3vw,36px) clamp(28px,5vw,64px);
    cursor:default; position:relative;
    transition: background .3s;
  }
  .pilar:hover { background:rgba(255,255,255,.04); }

  .pilar + .pilar::before {
    content:'';
    position:absolute; left:0; top:20%; bottom:20%;
    width:1px; background:rgba(255,255,255,.08);
  }

  .pilar-sigla {
    font-family:'Rajdhani',sans-serif; font-weight:700;
    font-size:clamp(30px,4vw,58px);
    letter-spacing:3px; color:white; line-height:1;
    transition: color .3s;
  }
  .pilar:hover .pilar-sigla { color:var(--cyan); }

  .pilar-desc {
    font-size:clamp(9px,1vw,13px); font-weight:300;
    letter-spacing:2px; text-transform:uppercase;
    color:rgba(255,255,255,.3); text-align:center;
    transition: color .3s;
  }
  .pilar:hover .pilar-desc { color:rgba(255,255,255,.55); }

  /* Ecosistema desc más pequeño para caber */
  .pilar:last-child .pilar-desc {
    font-size:clamp(9px,1vw,13px); letter-spacing:1.5px;
  }

  /* ── LÍNEA DECO ── */
  .deco-line {
    width:clamp(80px,10vw,160px); height:2px;
    background:linear-gradient(90deg,var(--cyan),var(--verde));
    margin-top:clamp(20px,3vh,36px);
    opacity:0;
    animation: fadeUp .8s cubic-bezier(.16,1,.3,1) .8s forwards;
  }

  /* ── SILUETAS ── */
  .siluetas-track {
    position:fixed; bottom:38px; left:0;
    width:100%; height:clamp(55px,9vh,90px);
    overflow:hidden; z-index:3;
    mask-image: linear-gradient(90deg,transparent 0%,black 8%,black 92%,transparent 100%);
    -webkit-mask-image: linear-gradient(90deg,transparent 0%,black 8%,black 92%,transparent 100%);
  }

  .siluetas-belt {
    display:flex; align-items:flex-end;
    gap:clamp(52px,8vw,110px);
    position:absolute; bottom:0;
    animation: desfile 32s linear infinite;
  }
  @keyframes desfile { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  .silueta { opacity:.1; transition:opacity .3s; flex-shrink:0; }
  .silueta:hover { opacity:.25; }

  @keyframes vapor1 {
    0%   { transform:translateY(0)    scaleX(1);   opacity:.6; }
    100% { transform:translateY(-24px) scaleX(2);   opacity:0; }
  }
  @keyframes vapor2 {
    0%   { transform:translateY(0)    scaleX(1);   opacity:.5; }
    100% { transform:translateY(-20px) scaleX(2.2); opacity:0; }
  }
  @keyframes vapor3 {
    0%   { transform:translateY(0)    scaleX(1);   opacity:.4; }
    100% { transform:translateY(-18px) scaleX(1.8); opacity:0; }
  }
  .v1 { animation: vapor1 2.2s ease-out infinite; transform-origin: center bottom; }
  .v2 { animation: vapor2 2.8s ease-out infinite .5s; transform-origin: center bottom; }
  .v3 { animation: vapor3 2.4s ease-out infinite 1s; transform-origin: center bottom; }

  /* ── CORREO ── */
  .contacto {
    position:fixed; bottom:clamp(12px,2vh,20px); left:50%;
    transform:translateX(-50%); z-index:10;
    font-size:clamp(10px,1vw,12px); font-weight:300;
    letter-spacing:2.5px; color:rgba(255,255,255,.28);
    text-decoration:none; transition:color .3s; white-space:nowrap;
  }
  .contacto:hover { color:var(--cyan); }

  /* ── ANIMATIONS ── */
  @keyframes pulso  { 0%,100%{r:7;opacity:1} 50%{r:9;opacity:.65} }
  @keyframes flujoA { 0%{stroke-dashoffset:40} 100%{stroke-dashoffset:0} }
  @keyframes flujoB { 0%{stroke-dashoffset:30} 100%{stroke-dashoffset:0} }
  .nc  { animation:pulso  2.4s ease-in-out infinite; }
  .lfa { animation:flujoA 1.8s linear infinite; }
  .lfb { animation:flujoB 2.2s linear infinite; }
  @keyframes fadeUp { to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="stage">

      <circle cx="50" cy="50" r="3.5" fill="white"/>
    </svg>

    <div class="divider"></div>

    <div>
      <div class="wm-main">Central Gas</div>
      <div class="wm-sub">México</div>
    </div>
  </div>

  <!-- PILARES -->
  <div class="pilares">
    <div class="pilar">
      <div class="pilar-sigla">GNC</div>
      <div class="pilar-desc">Gas Natural Comprimido</div>
    </div>
    <div class="pilar">
      <div class="pilar-sigla">GNV</div>

    <div class="pilar">
      <div class="pilar-sigla">Ecosistema</div>
      <div class="pilar-desc">Desarrollo · Sustitución · Conversión</div>
    </div>
  </div>

  <div class="deco-line"></div>
</div>

<!-- SILUETAS -->

    <svg class="silueta" height="70" viewBox="0 0 340 70" fill="white">
      <path d="M10 48 L10 20 Q10 8 28 8 L72 8 L72 54 L10 54 Q6 54 6 50 Q6 48 10 48Z"/>
