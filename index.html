<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Gas</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #0D2B4E; --cyan: #00AEEF; --verde: #00C48C;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html { height:100%; }

  body {
    height:100%; min-height:100vh;
    background:var(--azul);
    font-family:'DM Sans',sans-serif;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }

  /* Grain */
  body::before {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
    opacity:.5;
  }
  /* Grid */
  body::after {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(0,174,239,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,174,239,.04) 1px,transparent 1px);
    background-size:60px 60px;
  }

  /* Glows */
  .g1,.g2 { position:fixed; border-radius:50%; pointer-events:none; z-index:0; filter:blur(130px); }
  .g1 { width:500px; height:500px; background:rgba(0,174,239,.07); top:-80px; left:-80px; animation:d1 18s ease-in-out infinite alternate; }
  .g2 { width:380px; height:380px; background:rgba(0,196,140,.05); bottom:-60px; right:-60px; animation:d2 14s ease-in-out infinite alternate; }
  @keyframes d1 { to { transform:translate(50px,35px); } }
  @keyframes d2 { to { transform:translate(-35px,-25px); } }

  /* ── CONTENIDO CENTRAL ── */
  .center {
    position:relative; z-index:2;
    display:flex; flex-direction:column;
    align-items:center; gap:clamp(28px,4vh,48px);
    padding-bottom:clamp(80px,12vh,110px); /* espacio para vehículos */
  }

  /* ── LOGO ── */
  .logo {
    display:flex; align-items:center;
    gap:clamp(16px,2.5vw,28px);
    opacity:0; transform:translateY(18px);
    animation:up .8s cubic-bezier(.16,1,.3,1) .15s forwards;
  }
  .div { width:1px; height:clamp(44px,6vw,80px); background:rgba(255,255,255,.14); }
  .wm-a {
    font-family:'Rajdhani',sans-serif; font-weight:700;
    font-size:clamp(36px,6vw,80px);
    letter-spacing:3px; text-transform:uppercase; line-height:1;
  }
  .wm-b {
    font-family:'Rajdhani',sans-serif; font-weight:300;
    font-size:clamp(11px,1.4vw,18px);
    letter-spacing:10px; text-transform:uppercase;
    color:rgba(255,255,255,.35); margin-top:5px;
  }

  /* ── PILARES ── */
  .pilares {
    display:flex; align-items:stretch;
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px; overflow:hidden;
    opacity:0; transform:translateY(14px);
    animation:up .8s cubic-bezier(.16,1,.3,1) .4s forwards;
  }
  .pilar {
    display:flex; flex-direction:column; align-items:center; gap:8px;
    padding:clamp(20px,3vw,36px) clamp(28px,5vw,64px);
    cursor:default; position:relative; transition:background .3s;
  }
  .pilar:hover { background:rgba(255,255,255,.04); }
  .pilar+.pilar::before {
    content:''; position:absolute; left:0; top:18%; bottom:18%;
    width:1px; background:rgba(255,255,255,.08);
  }
  .ps {
    font-family:'Rajdhani',sans-serif; font-weight:700;
    font-size:clamp(30px,4vw,58px); letter-spacing:3px;
    line-height:1; transition:color .3s;
  }
  .pilar:hover .ps { color:var(--cyan); }
  .pd {
    font-size:clamp(9px,1vw,13px); font-weight:300;
    letter-spacing:2px; text-transform:uppercase;
    color:rgba(255,255,255,.3); text-align:center;
    transition:color .3s;
  }
  .pilar:hover .pd { color:rgba(255,255,255,.55); }

  /* ── DECO LINE ── */
  .deco {
    width:clamp(80px,10vw,150px); height:2px;
    background:linear-gradient(90deg,var(--cyan),var(--verde));
    border-radius:2px;
    opacity:0; animation:up .8s cubic-bezier(.16,1,.3,1) .65s forwards;
  }

  /* ── VEHÍCULOS ── */
  .belt-wrap {
    position:fixed; bottom:0; left:0; width:100%;
    height:clamp(58px,10vh,96px);
    overflow:hidden; z-index:3;
    mask-image:linear-gradient(90deg,transparent 0%,black 7%,black 93%,transparent 100%);
    -webkit-mask-image:linear-gradient(90deg,transparent 0%,black 7%,black 93%,transparent 100%);
  }
  .belt {
    display:flex; align-items:flex-end;
    gap:clamp(40px,6vw,90px);
    position:absolute; bottom:0;
    animation:parade 32s linear infinite;
    white-space:nowrap;
  }
  @keyframes parade { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .s { opacity:.1; transition:opacity .3s; flex-shrink:0; }
  .s:hover { opacity:.25; }

  /* Vapor */
  @keyframes vap1 { 0%{transform:translateY(0) scaleX(1);opacity:.55} 100%{transform:translateY(-22px) scaleX(2);opacity:0} }
  @keyframes vap2 { 0%{transform:translateY(0) scaleX(1);opacity:.45} 100%{transform:translateY(-18px) scaleX(2.2);opacity:0} }
  @keyframes vap3 { 0%{transform:translateY(0) scaleX(1);opacity:.4}  100%{transform:translateY(-16px) scaleX(1.8);opacity:0} }
  .v1 { animation:vap1 2.2s ease-out infinite; transform-origin:center bottom; }
  .v2 { animation:vap2 2.8s ease-out .5s infinite; transform-origin:center bottom; }
  .v3 { animation:vap3 2.4s ease-out 1s  infinite; transform-origin:center bottom; }


  /* ── CORREO ── */
  .mail {
    font-size:clamp(10px,1vw,12px); font-weight:300;
    letter-spacing:2.5px; color:rgba(255,255,255,.4);
    text-decoration:none; white-space:nowrap;
    margin-top:clamp(10px,1.5vh,20px);
    transition:color .3s; z-index:5; position:relative;
  }
  .mail:hover { color:var(--cyan); }

  /* ── NODO ANIMATIONS ── */
  @keyframes pulse { 0%,100%{r:7;opacity:1} 50%{r:9;opacity:.6} }
  @keyframes fa { 0%{stroke-dashoffset:40} 100%{stroke-dashoffset:0} }
  @keyframes fb { 0%{stroke-dashoffset:30} 100%{stroke-dashoffset:0} }
  .nc  { animation:pulse 2.4s ease-in-out infinite; }
  .la  { animation:fa 1.8s linear infinite; }
  .lb  { animation:fb 2.2s linear infinite; }
  @keyframes up { to{opacity:1;transform:translateY(0)} }

  /* ══ RESPONSIVE MOBILE ══ */
  @media (max-width:640px) {
    .logo { flex-direction:column; align-items:center; gap:12px; }
    .div  { display:none; }
    .wm-a { font-size:clamp(34px,10vw,48px); text-align:center; white-space:nowrap; }
    .wm-b { font-size:clamp(10px,3vw,13px); text-align:center; letter-spacing:7px; }

    .pilares { flex-direction:column; width:90%; max-width:320px; }
    .pilar { flex-direction:row; align-items:center; justify-content:flex-start;
             gap:12px; padding:14px 18px; text-align:left; }
    .pilar+.pilar::before { left:0;top:0;bottom:auto;width:100%;height:1px; }
    .ps { font-size:clamp(20px,7vw,28px); min-width:72px; }
    .pd { font-size:clamp(8px,2.5vw,10px); text-align:left; letter-spacing:1.2px; }

    .belt-wrap { height:clamp(42px,7vh,62px); }
    .belt { gap:28px; animation-duration:24s; }
    .s { transform:scale(.5); transform-origin:bottom left; }  }
</style>
